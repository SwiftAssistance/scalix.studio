<!DOCTYPE html>
<html lang="en-GB">
<head>
  <!-- SEO: 404 page — noindex prevents Google from indexing dead URLs -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Scalix Studios</title>
  <meta name="robots" content="noindex, follow" /> <!-- SEO: noindex prevents 404 pages entering the index -->
  <meta name="description" content="The page you are looking for does not exist. Return to Scalix Studios homepage." />
  <style>
    /* SEO: minimal CSS — no Tailwind dependency, no external assets, no JS required */
    body { font-family: 'Poppins', sans-serif; text-align: center; padding: 4rem 1rem; background: #f8fafc; color: #1e293b; margin: 0; }
    h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; }
    p { color: #64748b; margin-bottom: 1.5rem; }
    a { color: #6d28d9; font-weight: 600; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <!-- SEO: static 404 page — no JS required, immediately readable by crawlers -->
  <h1>Page Not Found</h1>
  <p>The page you&#39;re looking for doesn&#39;t exist or has moved.</p>

</body>
</html>
